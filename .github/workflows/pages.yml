name: GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build site
        run: |
          mkdir -p _site
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>witness-transport</title>
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            <style>
              body { max-width: 900px; margin: 2rem auto; padding: 0 1rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292f; }
              a { color: #0969da; }
              pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
              code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 85%; }
              pre code { background: none; padding: 0; font-size: 100%; }
              h1, h2, h3 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
              nav { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin-bottom: 2rem; }
              nav a { margin-right: 1.5rem; font-weight: 600; }
              .section { margin-bottom: 3rem; }
            </style>
          </head>
          <body>
            <nav>
              <a href="#readme">README</a>
              <a href="#claims">CLAIMS</a>
            </nav>
            <div class="section" id="readme"><div id="readme-content"></div></div>
            <hr>
            <div class="section" id="claims"><div id="claims-content"></div></div>
            <script>
              async function render(file, targetId) {
                try {
                  const resp = await fetch(file);
                  const text = await resp.text();
                  document.getElementById(targetId).innerHTML = marked.parse(text);
                } catch(e) {
                  document.getElementById(targetId).innerHTML = '<p>Failed to load ' + file + '</p>';
                }
              }
              render('README.md', 'readme-content');
              render('CLAIMS.md', 'claims-content');
            </script>
          </body>
          </html>
          HTMLEOF
          cp README.md _site/
          cp CLAIMS.md _site/

      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
